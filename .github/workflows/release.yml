name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        env:
          GIT_ACTOR: "${{ github.actor }}"
        run: |
          git config user.name "$GIT_ACTOR"
          git config user.email "$GIT_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Add dependency repos
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo add valkey https://valkey-io.github.io/valkey-helm/
          helm repo add gitea-charts https://dl.gitea.com/charts/
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add guerzon https://guerzon.github.io/vaultwarden

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
          skip_existing: true
