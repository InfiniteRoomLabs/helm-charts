apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: garage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rpcSecret.existingSecret }}
                  key: {{ .Values.rpcSecret.key }}
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminToken.existingSecret }}
                  key: {{ .Values.adminToken.key }}
            - name: GARAGE_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.metricsToken.existingSecret }}
                  key: {{ .Values.metricsToken.key }}
          ports:
            - name: s3
              containerPort: {{ .Values.service.s3.port }}
            - name: web
              containerPort: {{ .Values.service.web.port }}
            - name: admin
              containerPort: {{ .Values.service.admin.port }}
            - name: rpc
              containerPort: {{ .Values.service.rpc.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            {{- if .Values.persistence.data.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.data.mountPath }}
            {{- end }}
            {{- if .Values.persistence.meta.enabled }}
            - name: meta
              mountPath: {{ .Values.persistence.meta.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 20
        {{- if .Values.webui.enabled }}
        - name: garage-webui
          image: "{{ .Values.webui.image.repository }}:{{ .Values.webui.image.tag }}"
          imagePullPolicy: {{ .Values.webui.image.pullPolicy }}
          ports:
            - name: webui
              containerPort: {{ .Values.webui.service.port }}
          env:
            - name: GARAGE_ADMIN_API
              value: "http://localhost:{{ .Values.service.admin.port }}"
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminToken.existingSecret }}
                  key: {{ .Values.adminToken.key }}
          resources:
            {{- toYaml .Values.webui.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        {{- if .Values.persistence.data.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim }}
        {{- end }}
        {{- if .Values.persistence.meta.enabled }}
        - name: meta
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.meta.existingClaim }}
        {{- end }}
