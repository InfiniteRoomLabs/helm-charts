apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.s3.type }}
  ports:
    - name: s3
      port: {{ .Values.service.s3.port }}
      targetPort: s3
    - name: web
      port: {{ .Values.service.web.port }}
      targetPort: web
    - name: admin
      port: {{ .Values.service.admin.port }}
      targetPort: admin
    - name: rpc
      port: {{ .Values.service.rpc.port }}
      targetPort: rpc
  selector:
    app.kubernetes.io/name: garage
    app.kubernetes.io/instance: {{ .Release.Name }}
