apiVersion: v2
name: irl-monitoring
description: Monitoring umbrella -- kube-prometheus-stack + Loki + Tempo + OTel Collector. Complete observability for the IRL homelab.
type: application
version: 0.3.2
appVersion: "1.0"
keywords:
  - monitoring
  - prometheus
  - grafana
  - loki
  - tempo
  - opentelemetry
  - observability
home: https://github.com/InfiniteRoomLabs/helm-charts
maintainers:
  - name: Infinite Room Labs

dependencies:
  - name: kube-prometheus-stack
    version: "65.8.1"
    repository: "https://prometheus-community.github.io/helm-charts"
  - name: loki
    version: "6.24.1"
    repository: "https://grafana.github.io/helm-charts"
  - name: tempo
    version: "1.24.4"
    repository: "https://grafana.github.io/helm-charts"
  - name: opentelemetry-collector
    version: "0.147.1"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
