# irl-monitoring -- Complete observability stack
#
# Bundles kube-prometheus-stack (Prometheus + Grafana + Alertmanager)
# and Loki (log aggregation) into a single release.

kube-prometheus-stack:
  grafana:
    adminPassword: ""  # Set via existingSecret or --set at install time
    service:
      type: NodePort
      nodePort: 30001
    resources:
      limits:
        memory: "512Mi"
      requests:
        memory: "128Mi"

  prometheus:
    service:
      type: NodePort
      nodePort: 30090
    prometheusSpec:
      retention: 30d
      resources:
        limits:
          memory: "1Gi"
        requests:
          memory: "256Mi"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            resources:
              requests:
                storage: 15Gi

  alertmanager:
    service:
      type: NodePort
      nodePort: 30093
    alertmanagerSpec:
      resources:
        limits:
          memory: "128Mi"
        requests:
          memory: "64Mi"

loki:
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
    resources:
      limits:
        memory: "512Mi"
      requests:
        memory: "128Mi"
    persistence:
      storageClass: local-path
      size: 10Gi
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  minio:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

# Traefik IngressRoutes for monitoring services
ingress:
  grafana:
    enabled: true
    host: "grafana.lab.infiniteroomlabs.cloud"
    serviceName: "monitoring-grafana"
    servicePort: 80
  prometheus:
    enabled: true
    host: "metrics.internal.lab.infiniteroomlabs.cloud"
    serviceName: "monitoring-kube-prometheus-prometheus"
    servicePort: 9090
  alertmanager:
    enabled: true
    host: "alerts.internal.lab.infiniteroomlabs.cloud"
    serviceName: "monitoring-kube-prometheus-alertmanager"
    servicePort: 9093
