apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: openviking
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openviking
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openviking
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Main OpenViking server
        - name: openviking
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HOME
              value: /tmp
            - name: OPENVIKING_CONFIG_FILE
              value: /config/ov.conf
            - name: OPENVIKING_ROOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.existingSecret }}
                  key: {{ .Values.apiKey.key }}
          ports:
            - name: api
              containerPort: {{ .Values.service.api.port }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.config.storage.workspace }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
        {{- if .Values.mcp.enabled }}
        # MCP sidecar for Claude Code integration
        - name: mcp
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          command: ["python", "-m", "openviking.mcp"]
          env:
            - name: HOME
              value: /tmp
            - name: OPENVIKING_API_BASE
              value: "http://localhost:{{ .Values.service.api.port }}"
            - name: OPENVIKING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.existingSecret }}
                  key: {{ .Values.apiKey.key }}
            - name: MCP_PORT
              value: "{{ .Values.mcp.port }}"
          ports:
            - name: mcp
              containerPort: {{ .Values.mcp.port }}
          resources:
            {{- toYaml .Values.mcpResources | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- end }}
