# irl-openviking/values.yaml
# ==========================
# OpenViking context database with MCP sidecar.
# https://github.com/volcengine/OpenViking

image:
  repository: ghcr.io/volcengine/openviking
  tag: "v0.2.9"
  pullPolicy: IfNotPresent

# OpenViking configuration
config:
  # Embedding model (Ollama, in-cluster)
  embedding:
    provider: "ollama"
    model: "nomic-embed-text:latest"
    apiBase: "http://ollama.irl.svc.cluster.local:11434/v1"
    apiKey: "ollama"
    dimension: 768
    batchSize: 32
    maxConcurrent: 10
  # VLM for semantic understanding (Gemini via litellm)
  vlm:
    provider: "litellm"
    model: "gemini/gemini-3.1-pro-preview"
    apiBase: ""
    apiKey: "injected-at-runtime"
    maxConcurrent: 4
  # Storage backends
  storage:
    agfsBackend: "local"
    vectordbBackend: "local"
    workspace: "/data/openviking"

# API key -- must be provided via existingSecret
apiKey:
  existingSecret: "openviking-api-key"
  key: "root-api-key"

# VLM API key -- injected at runtime into the VLM config block
vlmApiKey:
  existingSecret: "gemini-api-key"
  key: "api-key"

# MCP sidecar (separate process for Claude Code integration)
# Disabled: MCP server is in examples/mcp-query/, not packaged in the
# official Docker image. Needs a custom image build to enable.
# Access OpenViking via REST API at port 1933 instead.
mcp:
  enabled: false
  image:
    repository: ghcr.io/volcengine/openviking
    tag: "v0.2.9"
    pullPolicy: IfNotPresent
  port: 2033

# Services
service:
  api:
    port: 1933
    type: NodePort
    nodePort: 31933
  mcp:
    port: 2033
    type: ClusterIP

# Persistence -- ZFS-backed PV
persistence:
  enabled: true
  existingClaim: openviking-data-pvc
  size: 20Gi

# Resources
resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

mcpResources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Schedule on homelab (needs Ollama access, ZFS storage)
nodeSelector:
  irl.dev/tier: data

tolerations: []
affinity: {}
