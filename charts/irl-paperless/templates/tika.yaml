{{- if .Values.tika.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-tika
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "irl-paperless.labels" . | nindent 4 }}
    app.kubernetes.io/component: tika
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "irl-paperless.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tika
  template:
    metadata:
      labels:
        {{- include "irl-paperless.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tika
    spec:
      securityContext:
        runAsUser: 35002
        runAsGroup: 35002
        fsGroup: 35002
      containers:
        - name: tika
          image: "{{ .Values.tika.image.repository }}:{{ .Values.tika.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9998
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /tika
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /tika
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.tika.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tika
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "irl-paperless.labels" . | nindent 4 }}
    app.kubernetes.io/component: tika
spec:
  type: ClusterIP
  selector:
    {{- include "irl-paperless.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tika
  ports:
    - name: http
      port: 9998
      targetPort: http
      protocol: TCP
{{- end }}
