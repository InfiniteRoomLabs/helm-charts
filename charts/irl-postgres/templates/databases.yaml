{{/*
Database creation is handled outside Helm.
CNPG manages superuser credentials internally (peer auth via unix socket).
Databases are created via the helm-deploy.yml Ansible playbook using
kubectl exec into the CNPG primary pod.

To create databases manually:
  kubectl exec -n irl postgresql-1 -c postgres -- psql -U postgres -c "CREATE DATABASE mydb OWNER myuser;"
*/}}
