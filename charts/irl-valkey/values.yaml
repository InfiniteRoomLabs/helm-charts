# irl-valkey -- Valkey (Redis-compatible) with sensible defaults
#
# Wire-compatible with Redis clients. Uses official Valkey images.
# Auth via existingSecret pattern (no plaintext passwords in values).

# Values passed to the valkey subchart (valkey-helm/valkey v0.8.x)
# See: https://github.com/valkey-io/valkey-helm
valkey:
  replicaCount: 1

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  dataStorage:
    enabled: true
    size: 2Gi

  # -- Valkey server config (mounted as valkey.conf via ConfigMap)
  valkeyConfig: |
    maxmemory 200mb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec

  # -- Auth via ACL users, password from existing K8s Secret
  auth:
    enabled: true
    usersExistingSecret: "redis-auth"
    aclUsers:
      default:
        permissions: "~* &* +@all"
        passwordKey: "redis-password"

  # -- Prometheus metrics exporter
  metrics:
    enabled: true
